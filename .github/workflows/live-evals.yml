name: Live AI Evals

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  live-evals:
    if: ${{ vars.LIVE_EVALS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: live-ai-evals
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - name: Run protected live suite
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_NAMESPACE: ${{ vars.PINECONE_NAMESPACE }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_TRACING: "true"
          RUN_LIVE_AI: "1"
        run: pytest -m live_ai -q

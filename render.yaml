services:
  - type: web
    runtime: python
    name: lpe-api
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn api.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: checksPass
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://lpe-frontend-pss5.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        value: lpe-knowledge-v1
      - key: PINECONE_NAMESPACE
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        value: london-property-explorer
      - key: LANGSMITH_TRACING
        value: "true"

  - type: web
    runtime: static
    name: lpe-frontend
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: VITE_API_BASE_URL
        value: https://lpe-api-e7n7.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
